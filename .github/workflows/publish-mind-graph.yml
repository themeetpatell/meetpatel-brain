name: publish-mind-graph

# Nightly: extract the brain-vault graph and PR the sanitized JSON into the
# public site repo so themeetpatel.com/mind has fresh data.
#
# Secrets required:
#   SITE_REPO_TOKEN — fine-grained PAT with `contents: write` +
#                     `pull-requests: write` on `themeetpatell/themeetpatel`.
#
# Manual run: Actions → publish-mind-graph → "Run workflow".

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mind-graph-publish
  cancel-in-progress: true

env:
  SITE_REPO: themeetpatell/themeetpatel
  SITE_PATH: public/mind

jobs:
  extract-and-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout brain vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run extractor
        run: |
          mkdir -p out/${{ env.SITE_PATH }}
          node scripts/extract-graph.mjs --vault . --out out/${{ env.SITE_PATH }}

      - name: Show extractor output summary
        run: |
          ls -lh out/${{ env.SITE_PATH }}
          echo "--- index.json ---"
          cat out/${{ env.SITE_PATH }}/index.json

      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SITE_REPO }}
          token: ${{ secrets.SITE_REPO_TOKEN }}
          path: site-repo

      - name: Copy graph data into site repo
        run: |
          mkdir -p site-repo/${{ env.SITE_PATH }}
          cp out/${{ env.SITE_PATH }}/*.json site-repo/${{ env.SITE_PATH }}/

      - name: Open PR on site repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: site-repo
          token: ${{ secrets.SITE_REPO_TOKEN }}
          branch: chore/mind-graph-update
          delete-branch: true
          title: "chore(mind): nightly graph snapshot"
          commit-message: |
            chore(mind): refresh graph snapshot

            Auto-generated by publish-mind-graph in the brain-vault repo.
            Contains only sanitized graph topology (no titles, no content).
          body: |
            Automated update of `public/mind/*.json` from the brain-vault
            extractor.

            Contains only the sanitized graph topology used by `/mind` —
            no titles, no body, no folder paths beyond the top-level PARA
            bucket. See the extractor at
            `themeetpatell/meetpatel-brain:scripts/extract-graph.mjs`.

            Merge to ship.
          labels: |
            automated
            mind-graph
